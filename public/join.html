<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c10" />
  <title>Join BigBricey</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(900px 500px at 10% -10%, #1a3a2a 0%, transparent 55%),
        radial-gradient(800px 400px at 100% 0%, #2a2410 0%, transparent 50%),
        #0a0c10;
    }
    .wrap { max-width: 420px; margin: 0 auto; padding: 48px 18px; }
    h1 { font-size: 1.8rem; margin: 0 0 8px; color: #fff; }
    .lead { color: #a8b0bc; line-height: 1.5; margin: 0 0 22px; }
    .panel {
      background: rgba(18,20,26,0.92); border: 1px solid rgba(240,198,116,0.25);
      border-radius: 16px; padding: 20px;
    }
    label { display: block; font-size: 12px; color: #9aa3b0; margin-bottom: 6px; }
    input {
      width: 100%; box-sizing: border-box; font-size: 18px; letter-spacing: .06em;
      padding: 14px; border-radius: 10px; border: 1px solid #333;
      background: #0e1016; color: #eee; margin-bottom: 12px; text-transform: uppercase;
    }
    button {
      width: 100%; border: 0; border-radius: 12px; padding: 14px;
      font-weight: 800; font-size: 1rem; background: #f0c674; color: #111; cursor: pointer;
    }
    button:disabled { opacity: 0.5; }
    .err {
      display: none; background: #3a1a1a; border: 1px solid #833; color: #f8b;
      border-radius: 10px; padding: 12px; margin-bottom: 12px; font-size: 0.95rem;
    }
    .err.show { display: block; }
    .meta { color: #667; font-size: 0.85rem; margin-top: 14px; line-height: 1.4; }
    a { color: #f0c674; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>You're invited</h1>
    <p class="lead">
      Signed in as <b id="emailLabel">…</b>. Enter the invite code Brice gave you.
      Your food log stays private — only you can see it.
    </p>
    <div id="err" class="err"></div>
    <div class="panel">
      <label for="code">Invite code</label>
      <input id="code" autocomplete="off" placeholder="Invite code" />
      <button type="button" id="go">Unlock my account</button>
      <p class="meta">
        Wrong Google account? <a href="/api/auth/logout">Log out</a> and try again.
        No code? Ask Brice.
      </p>
    </div>
  </div>
  <script>
    (async function () {
      const err = document.getElementById("err");
      const emailLabel = document.getElementById("emailLabel");
      const params = new URLSearchParams(location.search);
      if (params.get("email")) emailLabel.textContent = params.get("email");

      const me = await fetch("/api/auth/me").then((r) => r.json()).catch(() => ({}));
      if (!me.authenticated) {
        location.replace("/?error=" + encodeURIComponent("Sign in with Google first."));
        return;
      }
      emailLabel.textContent = me.email || params.get("email") || "you";
      if (me.member) {
        location.replace(me.onboarding_complete ? "/app.html" : "/onboarding.html");
        return;
      }

      document.getElementById("go").onclick = async function () {
        err.classList.remove("show");
        const code = document.getElementById("code").value.trim();
        if (!code) {
          err.textContent = "Enter the invite code.";
          err.classList.add("show");
          return;
        }
        this.disabled = true;
        try {
          const r = await fetch("/api/auth/redeem", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.message || d.error || "Redeem failed");
          location.replace("/onboarding.html");
        } catch (e) {
          err.textContent = e.message || String(e);
          err.classList.add("show");
          this.disabled = false;
        }
      };

      document.getElementById("code").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("go").click();
      });
    })();
  </script>
</body>
</html>
